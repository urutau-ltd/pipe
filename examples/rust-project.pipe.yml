# examples/rust-project.pipe.yml
# Typical Rust workflow: formatting + lint in parallel, then tests and release build.

name: rust-project

env:
  BINARY_NAME: myapp
  BUILD_DIR: ./dist

steps:
  - name: fmt
    parallel: true
    run: cargo fmt --all -- --check

  - name: clippy
    parallel: true
    run: cargo clippy --all-targets --all-features -- -D warnings

  - name: test
    run: cargo test --all-features

  - name: build
    run: |
      mkdir -p "$BUILD_DIR"
      cargo build --release
      cp "target/release/$BINARY_NAME" "$BUILD_DIR/$BINARY_NAME"
      echo "built: $BUILD_DIR/$BINARY_NAME"

  - name: deploy
    branches: [main]
    run: |
      scp "$BUILD_DIR/$BINARY_NAME" deploy@yourserver:/usr/local/bin/$BINARY_NAME
      ssh deploy@yourserver "systemctl restart $BINARY_NAME"
