# examples/multi-release.pipe.yml
# Heavy release pipeline. Intended for main/release branches only.

name: multi-release

env:
  APP: app
  OUT_DIR: dist

steps:
  - name: clean
    run: rm -rf "$OUT_DIR" && mkdir -p "$OUT_DIR"

  - name: test
    run: go test -count=1 ./...

  - name: build-linux-amd64
    parallel: true
    run: |
      CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
        go build -ldflags="-s -w -X main.version=$PIPE_COMMIT" -o "$OUT_DIR/$APP-linux-amd64" .

  - name: build-linux-arm64
    parallel: true
    run: |
      CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
        go build -ldflags="-s -w -X main.version=$PIPE_COMMIT" -o "$OUT_DIR/$APP-linux-arm64" .

  - name: checksums
    run: |
      cd "$OUT_DIR"
      sha256sum "$APP-linux-amd64" "$APP-linux-arm64" > SHA256SUMS
      cat SHA256SUMS

  - name: sign
    branches: [main, release]
    run: |
      gpg --batch --yes --armor --detach-sign "$OUT_DIR/SHA256SUMS"
      echo "signed $OUT_DIR/SHA256SUMS"
